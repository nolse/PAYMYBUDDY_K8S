apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: paymybuddy
# Opaque = type générique pour stocker des données sensibles arbitraires
# Les valeurs en stringData sont automatiquement encodées en base64 par Kubernetes
type: Opaque
stringData:
  # Mot de passe root MySQL - utilisé par MySQL et PayMyBuddy
  root-password: password
  # Utilisateur root MySQL - référencé par PayMyBuddy pour la connexion JDBC
  username: root
